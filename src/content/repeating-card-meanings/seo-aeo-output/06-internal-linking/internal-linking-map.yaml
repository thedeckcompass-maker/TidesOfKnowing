# Internal Linking Map
# Tides of Knowing — Repeating Card Meanings
# Generated: 2026-05-18
# Stage: 6 — Internal Linking
#
# This file records the cluster membership, hub status, linking tier, and anchor text
# for each of the 78 repeating card meaning pages.
#
# For direct card-to-card link targets (3-5 per card), see related-card-map.yaml.
# For cluster definitions and pillar page candidates, see high-authority-clusters.md.
# For topic cluster linking strategy, see topic-cluster-map.md.
#
# Linking tiers:
#   tier-1: Cross-cluster hub (10 cards) — highest internal link authority
#   tier-2: Multi-cluster member (2+ clusters) — high internal link authority
#   tier-3: Single cluster member — standard internal link authority
#   tier-4: No cluster assignment yet — minimal internal linking; awaits future cluster expansion
#
# Anchor text principle: anchor text should describe the card's repeating pattern,
# not just the card name. Format: "{card name} repeating meaning" for generic links;
# use pattern-specific anchor text where contextually available.

